spring.application.name=ai-service
server.port=8085

spring.datasource.url=${AI_DB_URL:jdbc:mysql://localhost:3306/aidb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${AI_DB_USERNAME:root}
spring.datasource.password=${AI_DB_PASSWORD}
spring.datasource.driver-class-name=${AI_DB_DRIVER:com.mysql.cj.jdbc.Driver}

spring.jpa.hibernate.ddl-auto=${AI_JPA_DDL_AUTO:update}
spring.jpa.show-sql=${AI_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# RabbitMQ Configuration
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}
spring.rabbitmq.listener.simple.missing-queues-fatal=false

# Quota Reset Configuration
app.rabbit.quota-events.exchange=${RABBITMQ_QUOTA_EVENTS_EXCHANGE:quota.events.exchange}
app.rabbit.quota-reset.queue=${RABBITMQ_QUOTA_RESET_QUEUE:quota.reset.queue}
app.rabbit.quota-reset.routing-key=${RABBITMQ_QUOTA_RESET_ROUTING_KEY:quota.reset}
app.rabbit.quota-reset.enabled=${QUOTA_RESET_ENABLED:true}

# AI Quota Configuration
app.ai.free-monthly-generation-limit=${AI_FREE_GENERATION_LIMIT:5}
app.ai.free-monthly-ats-limit=${AI_FREE_ATS_LIMIT:3}
app.ai.premium-monthly-generation-limit=${AI_PREMIUM_GENERATION_LIMIT:100}
app.ai.premium-monthly-ats-limit=${AI_PREMIUM_ATS_LIMIT:50}
