spring:
  application:
    name: auth-service
  datasource:
    url: ${AUTH_DB_URL:jdbc:mysql://localhost:3306/authdb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${AUTH_DB_USERNAME:root}
    password: ${AUTH_DB_PASSWORD}
    driver-class-name: ${AUTH_DB_DRIVER:com.mysql.cj.jdbc.Driver}
  jpa:
    hibernate:
      ddl-auto: ${AUTH_JPA_DDL_AUTO:update}
    show-sql: ${AUTH_JPA_SHOW_SQL:true}
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.MySQLDialect
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}  
            scope:
              - openid
              - profile
              - email
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

server:
  port: 8081
  forward-headers-strategy: framework

security:
  jwt:
    secret: ${AUTH_JWT_SECRET}
    access-token-expiration-ms: ${AUTH_JWT_ACCESS_EXPIRATION_MS:3600000}
    refresh-token-expiration-ms: ${AUTH_JWT_REFRESH_EXPIRATION_MS:604800000}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:8080}
  oauth2:
    authorized-redirect-uri: ${APP_OAUTH2_AUTHORIZED_REDIRECT_URI:http://localhost:3000/oauth2/redirect}
    failure-redirect-uri: ${APP_OAUTH2_FAILURE_REDIRECT_URI:http://localhost:3000/oauth2/redirect}
  mail:
    from: ${MAIL_FROM:${MAIL_USERNAME:no-reply@resumeai.local}}
    brand-name: ${MAIL_BRAND_NAME:ResumeAI}
  otp:
    expiry-minutes: ${OTP_EXPIRY_MINUTES:5}
    max-attempts: ${OTP_MAX_ATTEMPTS:5}
    resend-cooldown-seconds: ${OTP_RESEND_COOLDOWN_SECONDS:60}
    cleanup-cron: ${OTP_CLEANUP_CRON:0 */10 * * * *}
    rate-limit:
      max-requests: ${OTP_RATE_LIMIT_MAX_REQUESTS:10}
      window-seconds: ${OTP_RATE_LIMIT_WINDOW_SECONDS:3600}
