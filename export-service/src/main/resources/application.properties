spring.application.name=export-service
server.port=8086

resume-service.base-url=${RESUME_SERVICE_URL:http://localhost:8082}
section-service.base-url=${SECTION_SERVICE_URL:http://localhost:8083}

spring.datasource.url=${EXPORT_DB_URL:jdbc:mysql://localhost:3306/exportdb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${EXPORT_DB_USERNAME:root}
spring.datasource.password=${EXPORT_DB_PASSWORD}
spring.datasource.driver-class-name=${EXPORT_DB_DRIVER:com.mysql.cj.jdbc.Driver}

spring.jpa.hibernate.ddl-auto=${EXPORT_JPA_DDL_AUTO:update}
spring.jpa.show-sql=${EXPORT_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
